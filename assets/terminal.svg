<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      .font { font-family: 'Fira Code', 'Courier New', monospace; font-size: 15px; }
      .prompt { fill: #f7768e; font-weight: bold; }
      .colon { fill: #a9b1d6; }
      .path { fill: #7aa2f7; font-weight: bold; }
      .dollar { fill: #bb9af7; font-weight: bold; }
      .cmd { fill: #e0af68; font-weight: bold; font-family: 'Fira Code', 'Courier New', monospace; font-size: 15px; }
      .out { fill: #a9b1d6; font-family: 'Fira Code', 'Courier New', monospace; font-size: 14px; }
      .out-green { fill: #9ece6a; }
      .cursor { fill: #c0caf5; animation: blink 1s step-end infinite; }
      
      @keyframes blink { 
        0%, 100% { opacity: 1; } 
        50% { opacity: 0; } 
      }
    </style>

    <clipPath id="type1">
      <rect x="170" y="55" width="0" height="30">
        <animate attributeName="width" values="0; 250; 250" keyTimes="0; 0.033; 1" dur="30s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="type2">
      <rect x="170" y="155" width="0" height="30">
        <animate attributeName="width" values="0; 0; 250; 250" keyTimes="0; 0.166; 0.2; 1" dur="30s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="type3">
      <rect x="170" y="225" width="0" height="30">
        <animate attributeName="width" values="0; 0; 250; 250" keyTimes="0; 0.333; 0.366; 1" dur="30s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="type4">
      <rect x="170" y="275" width="0" height="30">
        <animate attributeName="width" values="0; 0; 250; 250" keyTimes="0; 0.5; 0.533; 1" dur="30s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="type5">
      <rect x="170" y="325" width="0" height="30">
        <animate attributeName="width" values="0; 0; 250; 250" keyTimes="0; 0.666; 0.7; 1" dur="30s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="type6">
      <rect x="170" y="375" width="0" height="30">
        <animate attributeName="width" values="0; 0; 250; 250" keyTimes="0; 0.833; 0.866; 1" dur="30s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <!-- Terminal Window Background -->
  <rect width="800" height="500" fill="#1a1b26" rx="10" />
  
  <!-- Mac Window Header -->
  <path d="M 0 10 A 10 10 0 0 1 10 0 L 790 0 A 10 10 0 0 1 800 10 L 800 40 L 0 40 Z" fill="#24283b" />
  <circle cx="25" cy="20" r="6" fill="#ff5f56" />
  <circle cx="45" cy="20" r="6" fill="#ffbd2e" />
  <circle cx="65" cy="20" r="6" fill="#27c93f" />

  <!-- Block 1: docker compose up -->
  <g>
    <!-- Always visible until restart -->
    <text x="20" y="75" class="font"><tspan class="prompt">kaarthic@devOS</tspan><tspan class="colon">:</tspan><tspan class="path">~</tspan><tspan class="dollar">$ </tspan></text>
    
    <g clip-path="url(#type1)">
      <text x="170" y="75" class="cmd">docker compose up</text>
    </g>
    
    <g opacity="0">
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.05; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
      <text x="20" y="100" class="out">[+] Running 2/2</text>
      <text x="20" y="120" class="out"> <tspan class="out-green">✔ Container db </tspan> Started</text>
      <text x="20" y="140" class="out"> <tspan class="out-green">✔ Container web</tspan> Started</text>
    </g>
  </g>
  <g opacity="1">
    <animate attributeName="opacity" values="1; 0; 0" keyTimes="0; 0.166; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
    <rect class="cursor" y="62" width="9" height="17">
      <animate attributeName="x" values="170; 320; 320" keyTimes="0; 0.033; 1" dur="30s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Block 2: kubectl get pods -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.166; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
    <text x="20" y="175" class="font"><tspan class="prompt">kaarthic@devOS</tspan><tspan class="colon">:</tspan><tspan class="path">~</tspan><tspan class="dollar">$ </tspan></text>
    <g clip-path="url(#type2)">
      <text x="170" y="175" class="cmd">kubectl get pods</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.216; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
      <text x="20" y="195" class="out">NAME                               READY   STATUS    RESTARTS   AGE</text>
      <text x="20" y="215" class="out">api-gateway-7f8845c48-kx2q9      1/1     <tspan class="out-green">Running</tspan>   0          2m</text>
    </g>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.166; 0.333; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
    <rect class="cursor" y="162" width="9" height="17">
      <animate attributeName="x" values="170; 170; 315; 315" keyTimes="0; 0.166; 0.2; 1" dur="30s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Block 3: terraform apply -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.333; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
    <text x="20" y="245" class="font"><tspan class="prompt">kaarthic@devOS</tspan><tspan class="colon">:</tspan><tspan class="path">~</tspan><tspan class="dollar">$ </tspan></text>
    <g clip-path="url(#type3)">
      <text x="170" y="245" class="cmd">terraform apply</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.383; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
      <text x="20" y="265" class="out">Apply complete! Resources: <tspan class="out-green">5 added</tspan>, 0 changed, 0 destroyed.</text>
    </g>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.333; 0.5; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
    <rect class="cursor" y="232" width="9" height="17">
      <animate attributeName="x" values="170; 170; 305; 305" keyTimes="0; 0.333; 0.366; 1" dur="30s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Block 4: flutter build apk -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.5; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
    <text x="20" y="295" class="font"><tspan class="prompt">kaarthic@devOS</tspan><tspan class="colon">:</tspan><tspan class="path">~</tspan><tspan class="dollar">$ </tspan></text>
    <g clip-path="url(#type4)">
      <text x="170" y="295" class="cmd">flutter build apk</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.55; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
      <text x="20" y="315" class="out"><tspan class="out-green">✓</tspan> Built build/app/outputs/flutter-apk/app-release.apk (24.5MB).</text>
    </g>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.5; 0.666; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
    <rect class="cursor" y="282" width="9" height="17">
      <animate attributeName="x" values="170; 170; 325; 325" keyTimes="0; 0.5; 0.533; 1" dur="30s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Block 5: npm run dev -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.666; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
    <text x="20" y="345" class="font"><tspan class="prompt">kaarthic@devOS</tspan><tspan class="colon">:</tspan><tspan class="path">~</tspan><tspan class="dollar">$ </tspan></text>
    <g clip-path="url(#type5)">
      <text x="170" y="345" class="cmd">npm run dev</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.716; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
      <text x="20" y="365" class="out"><tspan class="out-green">VITE</tspan> v4.3.9 ready in 320 ms</text>
    </g>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.666; 0.833; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
    <rect class="cursor" y="332" width="9" height="17">
      <animate attributeName="x" values="170; 170; 270; 270" keyTimes="0; 0.666; 0.7; 1" dur="30s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Block 6: git push origin main -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.833; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
    <text x="20" y="395" class="font"><tspan class="prompt">kaarthic@devOS</tspan><tspan class="colon">:</tspan><tspan class="path">~</tspan><tspan class="dollar">$ </tspan></text>
    <g clip-path="url(#type6)">
      <text x="170" y="395" class="cmd">git push origin main</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.883; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
      <text x="20" y="415" class="out">Enumerating objects: 15, done.</text>
      <text x="20" y="435" class="out">Counting objects: 100% (15/15), done.</text>
      <text x="20" y="455" class="out">To https://github.com/kaarthicraja/portfolio.git</text>
    </g>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.833; 1" dur="30s" repeatCount="indefinite" calcMode="discrete" />
    <rect class="cursor" y="382" width="9" height="17">
      <animate attributeName="x" values="170; 170; 350; 350" keyTimes="0; 0.833; 0.866; 1" dur="30s" repeatCount="indefinite" />
    </rect>
  </g>

</svg>
