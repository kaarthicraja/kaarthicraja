<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 100" width="700" height="100">
  <defs>
    <style>.mono { font-family: 'Courier New', monospace; }</style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="700" height="100" fill="#0d0f14" rx="10"/>

  <!-- Animated corner dashes -->
  <rect x="2" y="2" width="696" height="96" rx="10" fill="none" stroke="#00f3ff" stroke-width="1.5" stroke-dasharray="12,6" filter="url(#glow)" opacity="0.6">
    <animateTransform attributeName="stroke-dashoffset" type="translate" values="0;36;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="0;36;0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Decorative quotes marks -->
  <text x="18" y="75" class="mono" font-size="72" fill="#00f3ff" opacity="0.12">"</text>
  <text x="662" y="88" class="mono" font-size="72" fill="#00f3ff" opacity="0.12">"</text>
</svg>
