<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="earth-grad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="40%" stop-color="#0277bd"/>
      <stop offset="100%" stop-color="#01579b"/>
    </radialGradient>
    <clipPath id="earth-clip">
      <circle cx="100" cy="100" r="72"/>
    </clipPath>
  </defs>
  <rect width="200" height="200" fill="#111211"/>

  <!-- Glow ring -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#34d399" stroke-width="3" opacity="0.5" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Earth body -->
  <circle cx="100" cy="100" r="72" fill="url(#earth-grad)"/>

  <!-- Rotating land masses -->
  <g clip-path="url(#earth-clip)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;-144,0" dur="15s" repeatCount="indefinite" calcMode="linear"/>
      <!-- Continent 1 -->
      <ellipse cx="80" cy="85" rx="30" ry="20" fill="#2e7d32" opacity="0.85"/>
      <ellipse cx="110" cy="100" rx="18" ry="25" fill="#388e3c" opacity="0.85"/>
      <!-- Continent 2 -->
      <ellipse cx="200" cy="90" rx="25" ry="15" fill="#2e7d32" opacity="0.85"/>
      <ellipse cx="185" cy="110" rx="12" ry="18" fill="#1b5e20" opacity="0.85"/>
      <!-- Continent 3 (repeat for seamless loop) -->
      <ellipse cx="320" cy="85" rx="30" ry="20" fill="#2e7d32" opacity="0.85"/>
      <ellipse cx="350" cy="100" rx="18" ry="25" fill="#388e3c" opacity="0.85"/>
    </g>
  </g>

  <!-- Atmosphere overlay -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#4fc3f7" stroke-width="8" opacity="0.15"/>

  <!-- Star dots in background -->
  <circle cx="20" cy="30" r="1.5" fill="#fff" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="175" cy="45" r="1" fill="#fff" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="30" cy="165" r="1.5" fill="#fff" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="170" cy="170" r="1" fill="#fff" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.9s" repeatCount="indefinite"/></circle>
</svg>
