<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 80" width="500" height="80">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="80" fill="#0d0f14"/>

  <!-- GitHub icon -->
  <g transform="translate(90, 15)">
    <circle cx="0" cy="20" r="22" fill="none" stroke="#ffffff" stroke-width="2" filter="url(#glow-sm)">
      <animate attributeName="stroke" values="#ffffff;#00f3ff;#ffffff" dur="3s" repeatCount="indefinite"/>
    </circle>
    <path d="M 0,8 C -8,8 -14,14 -14,22 C -14,28 -10,33 -4,35 C -3,35.2 -3,34.5 -3,34 L -3,31 C -7,32 -8,30 -8.3,29 C -8.5,28 -9,27.5 -9.5,27 C -10,26.5 -8,26.5 -7,27.5 C -6,28.5 -5,30 -3,30 C -3,29 -2.5,28 -2,27.5 C -6,27 -10,25 -10,18 C -10,16 -9,14 -8,12.5 C -8.3,11.5 -8.8,9 -7.5,8 C -7.5,8 -5,8 -3,10 C -2,9.7 -1,9.5 0,9.5 C 1,9.5 2,9.7 3,10 C 5,8 7.5,8 7.5,8 C 8.8,9 8.3,11.5 8,12.5 C 9,14 10,16 10,18 C 10,25 6,27 2,27.5 C 2.5,28 3,29 3,31 L 3,34 C 3,34.5 3,35.2 4,35 C 10,33 14,28 14,22 C 14,14 8,8 0,8 Z" fill="#ffffff"/>
    <text x="0" y="58" font-family="Courier New" font-size="10" fill="#718096" text-anchor="middle">GitHub</text>
  </g>

  <!-- LinkedIn icon -->
  <g transform="translate(210, 15)">
    <circle cx="0" cy="20" r="22" fill="none" stroke="#0077b5" stroke-width="2" filter="url(#glow-sm)">
      <animate attributeName="stroke" values="#0077b5;#00f3ff;#0077b5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <rect x="-10" y="10" width="6" height="18" fill="#0077b5"/>
    <circle cx="-7" cy="6" r="3" fill="#0077b5"/>
    <rect x="-1" y="14" width="6" height="14" fill="#0077b5"/>
    <path d="-1,14 Q 5,12 5,20 L 5,28" fill="#0077b5"/>
    <text x="0" y="58" font-family="Courier New" font-size="10" fill="#718096" text-anchor="middle">LinkedIn</text>
  </g>

  <!-- Email icon -->
  <g transform="translate(330, 15)">
    <circle cx="0" cy="20" r="22" fill="none" stroke="#bb9af7" stroke-width="2" filter="url(#glow-sm)">
      <animate attributeName="stroke" values="#bb9af7;#00f3ff;#bb9af7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <rect x="-12" y="10" width="24" height="18" rx="2" fill="none" stroke="#bb9af7" stroke-width="1.5"/>
    <polyline points="-12,10 0,20 12,10" fill="none" stroke="#bb9af7" stroke-width="1.5"/>
    <text x="0" y="58" font-family="Courier New" font-size="10" fill="#718096" text-anchor="middle">Email</text>
  </g>

  <!-- Twitter/X icon -->
  <g transform="translate(420, 15)">
    <circle cx="0" cy="20" r="22" fill="none" stroke="#1DA1F2" stroke-width="2" filter="url(#glow-sm)">
      <animate attributeName="stroke" values="#1DA1F2;#00f3ff;#1DA1F2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="26" font-family="Arial" font-size="18" fill="#1DA1F2" text-anchor="middle" font-weight="bold">𝕏</text>
    <text x="0" y="58" font-family="Courier New" font-size="10" fill="#718096" text-anchor="middle">Twitter</text>
  </g>
</svg>
