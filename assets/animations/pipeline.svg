<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 140" width="700" height="140">
  <defs>
    <style>.mono { font-family: 'Courier New', monospace; }</style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00f3ff" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="700" height="140" fill="#0d0f14" rx="8"/>
  <rect x="1" y="1" width="698" height="138" fill="none" stroke="#00f3ff" stroke-width="1" rx="8" opacity="0.2"/>

  <!-- Stage boxes -->
  <!-- 1: Code -->
  <rect x="20" y="45" width="90" height="50" fill="#1a1b26" stroke="#00f3ff" stroke-width="1.5" rx="6"/>
  <text x="65" y="67" class="mono" font-size="18" text-anchor="middle">💻</text>
  <text x="65" y="85" class="mono" font-size="10" fill="#00f3ff" text-anchor="middle">Code</text>

  <!-- Arrow 1→2 -->
  <line x1="110" y1="70" x2="140" y2="70" stroke="#00f3ff" stroke-width="2" marker-end="url(#arrow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" begin="0s"/>
  </line>

  <!-- 2: Build -->
  <rect x="145" y="45" width="90" height="50" fill="#1a1b26" stroke="#bb9af7" stroke-width="1.5" rx="6"/>
  <text x="190" y="67" class="mono" font-size="18" text-anchor="middle">🔨</text>
  <text x="190" y="85" class="mono" font-size="10" fill="#bb9af7" text-anchor="middle">Build</text>

  <!-- Arrow 2→3 -->
  <line x1="235" y1="70" x2="265" y2="70" stroke="#bb9af7" stroke-width="2" marker-end="url(#arrow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" begin="0.3s"/>
  </line>

  <!-- 3: Test -->
  <rect x="270" y="45" width="90" height="50" fill="#1a1b26" stroke="#00ff9f" stroke-width="1.5" rx="6"/>
  <text x="315" y="67" class="mono" font-size="18" text-anchor="middle">🧪</text>
  <text x="315" y="85" class="mono" font-size="10" fill="#00ff9f" text-anchor="middle">Test</text>

  <!-- Arrow 3→4 -->
  <line x1="360" y1="70" x2="390" y2="70" stroke="#00ff9f" stroke-width="2" marker-end="url(#arrow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" begin="0.6s"/>
  </line>

  <!-- 4: Docker -->
  <rect x="395" y="45" width="90" height="50" fill="#1a1b26" stroke="#2496ED" stroke-width="1.5" rx="6"/>
  <text x="440" y="67" class="mono" font-size="18" text-anchor="middle">🐳</text>
  <text x="440" y="85" class="mono" font-size="10" fill="#2496ED" text-anchor="middle">Docker</text>

  <!-- Arrow 4→5 -->
  <line x1="485" y1="70" x2="515" y2="70" stroke="#2496ED" stroke-width="2" marker-end="url(#arrow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" begin="0.9s"/>
  </line>

  <!-- 5: Deploy -->
  <rect x="520" y="45" width="90" height="50" fill="#1a1b26" stroke="#f7a928" stroke-width="1.5" rx="6"/>
  <text x="565" y="67" class="mono" font-size="18" text-anchor="middle">🚀</text>
  <text x="565" y="85" class="mono" font-size="10" fill="#f7a928" text-anchor="middle">Deploy</text>

  <!-- Arrow 5→6 -->
  <line x1="610" y1="70" x2="640" y2="70" stroke="#f7a928" stroke-width="2" marker-end="url(#arrow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" begin="1.2s"/>
  </line>

  <!-- 6: Monitor -->
  <rect x="645" y="45" width="40" height="50" fill="#1a1b26" stroke="#00f3ff" stroke-width="1.5" rx="6"/>
  <text x="665" y="67" class="mono" font-size="18" text-anchor="middle">📊</text>
  <text x="665" y="85" class="mono" font-size="8" fill="#00f3ff" text-anchor="middle">Monitor</text>

  <!-- Title -->
  <text x="350" y="20" class="mono" font-size="11" fill="#4a5568" text-anchor="middle">// CI/CD Pipeline</text>

  <!-- Animated progress dot -->
  <circle r="5" fill="#00f3ff" filter="url(#glow)">
    <animateMotion dur="6s" repeatCount="indefinite" path="M 65,70 L 145,70 L 235,70 L 315,70 L 395,70 L 485,70 L 565,70 L 645,70 L 665,70"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>
</svg>
