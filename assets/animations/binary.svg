    <text x="170"><animate attributeName="y" values="-20;420" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>1</text>
    <text x="170"><animate attributeName="y" values="-60;380" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>0</text>
    <text x="170"><animate attributeName="y" values="-100;340" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>1</text>
    <text x="170"><animate attributeName="y" values="-140;300" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>0</text>
    <text x="170"><animate attributeName="y" values="-180;260" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>0</text>
    <text x="170"><animate attributeName="y" values="-220;220" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>1</text>
    <text x="170"><animate attributeName="y" values="-260;180" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>1</text>
    <text x="170"><animate attributeName="y" values="-300;140" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>0</text>
  </g>
  <!-- Col 6 -->
  <g class="mono" font-size="14" fill="#00f3ff" opacity="0.7">
    <text x="210"><animate attributeName="y" values="-20;420" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>0</text>
    <text x="210"><animate attributeName="y" values="-60;380" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>1</text>
    <text x="210"><animate attributeName="y" values="-100;340" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>1</text>
    <text x="210"><animate attributeName="y" values="-140;300" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>0</text>
    <text x="210"><animate attributeName="y" values="-180;260" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>1</text>
    <text x="210"><animate attributeName="y" values="-220;220" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>1</text>
    <text x="210"><animate attributeName="y" values="-260;180" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>0</text>
    <text x="210"><animate attributeName="y" values="-300;140" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>0</text>
  </g>
  <!-- Col 7 -->
  <g class="mono" font-size="14" fill="#bb9af7" opacity="0.5">
    <text x="250"><animate attributeName="y" values="-20;420" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>1</text>
    <text x="250"><animate attributeName="y" values="-60;380" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>0</text>
    <text x="250"><animate attributeName="y" values="-100;340" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>0</text>
    <text x="250"><animate attributeName="y" values="-140;300" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>1</text>
    <text x="250"><animate attributeName="y" values="-180;260" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>1</text>
    <text x="250"><animate attributeName="y" values="-220;220" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>0</text>
    <text x="250"><animate attributeName="y" values="-260;180" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>1</text>
    <text x="250"><animate attributeName="y" values="-300;140" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>0</text>
  </g>
  <!-- Col 8 -->
  <g class="mono" font-size="14" fill="#00f3ff" filter="url(#glow)" opacity="0.9">
    <text x="290"><animate attributeName="y" values="-20;420" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>1</text>
    <text x="290"><animate attributeName="y" values="-60;380" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>1</text>
    <text x="290"><animate attributeName="y" values="-100;340" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>0</text>
    <text x="290"><animate attributeName="y" values="-140;300" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>0</text>
    <text x="290"><animate attributeName="y" values="-180;260" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>1</text>
    <text x="290"><animate attributeName="y" values="-220;220" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>1</text>
    <text x="290"><animate attributeName="y" values="-260;180" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>1</text>
    <text x="290"><animate attributeName="y" values="-300;140" dur="3.8s" begin="1.2s" repeatCount="indefinite"/>0</text>
