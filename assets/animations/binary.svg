<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>.mono { font-family: 'Courier New', monospace; }</style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0d0f14"/>

  <!-- Binary rain columns - 8 columns -->
  <!-- Col 1 -->
  <g class="mono" font-size="14" fill="#00f3ff" filter="url(#glow)" opacity="0.8">
    <text x="10"><animate attributeName="y" values="-20;420" dur="3s" repeatCount="indefinite"/>1</text>
    <text x="10"><animate attributeName="y" values="-60;380" dur="3s" repeatCount="indefinite"/>0</text>
    <text x="10"><animate attributeName="y" values="-100;340" dur="3s" repeatCount="indefinite"/>1</text>
    <text x="10"><animate attributeName="y" values="-140;300" dur="3s" repeatCount="indefinite"/>1</text>
    <text x="10"><animate attributeName="y" values="-180;260" dur="3s" repeatCount="indefinite"/>0</text>
    <text x="10"><animate attributeName="y" values="-220;220" dur="3s" repeatCount="indefinite"/>1</text>
    <text x="10"><animate attributeName="y" values="-260;180" dur="3s" repeatCount="indefinite"/>0</text>
    <text x="10"><animate attributeName="y" values="-300;140" dur="3s" repeatCount="indefinite"/>1</text>
  </g>
  <!-- Col 2 -->
  <g class="mono" font-size="14" fill="#00f3ff" filter="url(#glow)" opacity="0.5">
    <text x="50"><animate attributeName="y" values="-20;420" dur="4s" begin="0.5s" repeatCount="indefinite"/>0</text>
    <text x="50"><animate attributeName="y" values="-60;380" dur="4s" begin="0.5s" repeatCount="indefinite"/>1</text>
    <text x="50"><animate attributeName="y" values="-100;340" dur="4s" begin="0.5s" repeatCount="indefinite"/>0</text>
    <text x="50"><animate attributeName="y" values="-140;300" dur="4s" begin="0.5s" repeatCount="indefinite"/>0</text>
    <text x="50"><animate attributeName="y" values="-180;260" dur="4s" begin="0.5s" repeatCount="indefinite"/>1</text>
    <text x="50"><animate attributeName="y" values="-220;220" dur="4s" begin="0.5s" repeatCount="indefinite"/>1</text>
    <text x="50"><animate attributeName="y" values="-260;180" dur="4s" begin="0.5s" repeatCount="indefinite"/>0</text>
    <text x="50"><animate attributeName="y" values="-300;140" dur="4s" begin="0.5s" repeatCount="indefinite"/>1</text>
  </g>
  <!-- Col 3 -->
  <g class="mono" font-size="14" fill="#bb9af7" filter="url(#glow)" opacity="0.6">
    <text x="90"><animate attributeName="y" values="-20;420" dur="2.5s" begin="1s" repeatCount="indefinite"/>1</text>
    <text x="90"><animate attributeName="y" values="-60;380" dur="2.5s" begin="1s" repeatCount="indefinite"/>1</text>
    <text x="90"><animate attributeName="y" values="-100;340" dur="2.5s" begin="1s" repeatCount="indefinite"/>0</text>
    <text x="90"><animate attributeName="y" values="-140;300" dur="2.5s" begin="1s" repeatCount="indefinite"/>1</text>
    <text x="90"><animate attributeName="y" values="-180;260" dur="2.5s" begin="1s" repeatCount="indefinite"/>0</text>
    <text x="90"><animate attributeName="y" values="-220;220" dur="2.5s" begin="1s" repeatCount="indefinite"/>1</text>
    <text x="90"><animate attributeName="y" values="-260;180" dur="2.5s" begin="1s" repeatCount="indefinite"/>1</text>
    <text x="90"><animate attributeName="y" values="-300;140" dur="2.5s" begin="1s" repeatCount="indefinite"/>0</text>
