    <text x="130"><animate attributeName="y" values="-100;340" dur="3.5s" begin="0.2s" repeatCount="indefinite"/>1</text>
    <text x="130"><animate attributeName="y" values="-140;300" dur="3.5s" begin="0.2s" repeatCount="indefinite"/>1</text>
    <text x="130"><animate attributeName="y" values="-180;260" dur="3.5s" begin="0.2s" repeatCount="indefinite"/>0</text>
    <text x="130"><animate attributeName="y" values="-220;220" dur="3.5s" begin="0.2s" repeatCount="indefinite"/>1</text>
    <text x="130"><animate attributeName="y" values="-260;180" dur="3.5s" begin="0.2s" repeatCount="indefinite"/>0</text>
