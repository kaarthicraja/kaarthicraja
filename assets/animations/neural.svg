<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0d0f14"/>

  <!-- Connections (edges) -->
  <g stroke="#00f3ff" stroke-width="1" opacity="0.3" filter="url(#glow)">
    <line x1="200" y1="60" x2="100" y2="160"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/></line>
    <line x1="200" y1="60" x2="300" y2="160"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></line>
    <line x1="100" y1="160" x2="60" y2="280"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/></line>
    <line x1="100" y1="160" x2="200" y2="280"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.8s" repeatCount="indefinite"/></line>
    <line x1="300" y1="160" x2="200" y2="280"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.2s" repeatCount="indefinite"/></line>
    <line x1="300" y1="160" x2="340" y2="280"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.8s" repeatCount="indefinite"/></line>
    <!-- Extra connections -->
    <line x1="60" y1="280" x2="200" y2="340"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.3s" repeatCount="indefinite"/></line>
    <line x1="340" y1="280" x2="200" y2="340"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.9s" repeatCount="indefinite"/></line>
    <line x1="200" y1="280" x2="200" y2="340"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.1s" repeatCount="indefinite"/></line>
    <line x1="100" y1="160" x2="300" y2="160"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/></line>
    <line x1="60" y1="280" x2="340" y2="280"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite"/></line>
  </g>

  <!-- Pulsing nodes -->
  <!-- Root node -->
  <circle cx="200" cy="60" r="14" fill="#0d0f14" stroke="#00f3ff" stroke-width="2.5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="60" r="6" fill="#00f3ff">
    <animate attributeName="r" values="6;9;6" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Layer 1 nodes -->
  <circle cx="100" cy="160" r="12" fill="#0d0f14" stroke="#bb9af7" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="160" r="5" fill="#bb9af7">
    <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="300" cy="160" r="12" fill="#0d0f14" stroke="#bb9af7" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="160" r="5" fill="#bb9af7">
    <animate attributeName="r" values="5;8;5" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Layer 2 nodes -->
  <circle cx="60" cy="280" r="10" fill="#0d0f14" stroke="#00ff9f" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="280" r="4" fill="#00ff9f">
    <animate attributeName="r" values="4;7;4" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <circle cx="200" cy="280" r="10" fill="#0d0f14" stroke="#00ff9f" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="280" r="4" fill="#00ff9f">
    <animate attributeName="r" values="4;7;4" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="340" cy="280" r="10" fill="#0d0f14" stroke="#00ff9f" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="280" r="4" fill="#00ff9f">
    <animate attributeName="r" values="4;7;4" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Output node -->
  <circle cx="200" cy="340" r="14" fill="#0d0f14" stroke="#f7a928" stroke-width="2.5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="340" r="6" fill="#f7a928">
    <animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
