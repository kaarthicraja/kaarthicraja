<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="420" height="420">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="420" height="420" fill="#0a0c12"/>

  <!-- ── Connections (edges, with pulse animation) ── -->
  <!-- Root → L1-left -->
  <line x1="210" y1="75" x2="110" y2="175" stroke="#00f3ff" stroke-width="1.2" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.8;0.25" dur="2.8s" repeatCount="indefinite"/>
  </line>
  <!-- Root → L1-right -->
  <line x1="210" y1="75" x2="310" y2="175" stroke="#00f3ff" stroke-width="1.2" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.7;0.25" dur="3.2s" repeatCount="indefinite" begin="0.5s"/>
  </line>
  <!-- L1-left → L2-far-left -->
  <line x1="110" y1="175" x2="60" y2="295" stroke="#bb9af7" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite" begin="0.3s"/>
  </line>
  <!-- L1-left → L2-mid-left -->
  <line x1="110" y1="175" x2="185" y2="295" stroke="#bb9af7" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
  </line>
  <!-- L1-right → L2-mid-right -->
  <line x1="310" y1="175" x2="235" y2="295" stroke="#bb9af7" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.9s" repeatCount="indefinite" begin="0.4s"/>
  </line>
  <!-- L1-right → L2-far-right -->
  <line x1="310" y1="175" x2="360" y2="295" stroke="#bb9af7" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.8s" repeatCount="indefinite" begin="1s"/>
  </line>
  <!-- L2 → output -->
  <line x1="60"  y1="295" x2="210" y2="358" stroke="#00ff9f" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite" begin="0.6s"/>
  </line>
  <line x1="185" y1="295" x2="210" y2="358" stroke="#00ff9f" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.1s" repeatCount="indefinite" begin="0.2s"/>
  </line>
  <line x1="235" y1="295" x2="210" y2="358" stroke="#00ff9f" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.7s" repeatCount="indefinite" begin="0.9s"/>
  </line>
  <line x1="360" y1="295" x2="210" y2="358" stroke="#00ff9f" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.4s" repeatCount="indefinite" begin="0.1s"/>
  </line>

  <!-- ── Signal packets ── -->
  <!-- Packet 1: Root → L1-left -->
  <circle r="3.5" fill="#00f3ff" filter="url(#glow-sm)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0s" path="M 210,75 L 110,175"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Packet 2: L1-left → L2 mid-left -->
  <circle r="3" fill="#bb9af7" filter="url(#glow-sm)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.7s" path="M 110,175 L 185,295"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2s" repeatCount="indefinite" begin="0.7s"/>
  </circle>
  <!-- Packet 3: Root → L1-right -->
  <circle r="3.5" fill="#00f3ff" filter="url(#glow-sm)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="1.2s" path="M 210,75 L 310,175"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.5s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <!-- Packet 4: L1-right → output -->
  <circle r="3" fill="#00ff9f" filter="url(#glow-sm)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.4s" path="M 310,175 L 360,295 L 210,358"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <!-- Packet 5: L1-left → output via far left -->
  <circle r="2.5" fill="#f7a928" filter="url(#glow-sm)">
    <animateMotion dur="3s" repeatCount="indefinite" begin="1.8s" path="M 110,175 L 60,295 L 210,358"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3s" repeatCount="indefinite" begin="1.8s"/>
  </circle>

  <!-- ── Nodes ── -->
  <!-- Root -->
  <circle cx="210" cy="75" r="16" fill="#0a0c12" stroke="#00f3ff" stroke-width="2.5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="210" cy="75" r="7" fill="#00f3ff">
    <animate attributeName="r" values="7;10;7" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="210" y="50" font-family="'Courier New', monospace" font-size="10" fill="#4a5568" text-anchor="middle">INPUT</text>

  <!-- L1 nodes -->
  <circle cx="110" cy="175" r="13" fill="#0a0c12" stroke="#bb9af7" stroke-width="2" filter="url(#glow-sm)">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="110" cy="175" r="5" fill="#bb9af7">
    <animate attributeName="r" values="5;8;5" dur="2.1s" repeatCount="indefinite"/>
  </circle>

  <circle cx="310" cy="175" r="13" fill="#0a0c12" stroke="#bb9af7" stroke-width="2" filter="url(#glow-sm)">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="310" cy="175" r="5" fill="#bb9af7">
    <animate attributeName="r" values="5;8;5" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- L2 nodes -->
  <circle cx="60"  cy="295" r="11" fill="#0a0c12" stroke="#00ff9f" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="1;0.2;1" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60"  cy="295" r="4.5" fill="#00ff9f">
    <animate attributeName="r" values="4.5;7;4.5" dur="1.9s" repeatCount="indefinite"/>
  </circle>

  <circle cx="185" cy="295" r="11" fill="#0a0c12" stroke="#00ff9f" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="185" cy="295" r="4.5" fill="#00ff9f">
    <animate attributeName="r" values="4.5;7;4.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="235" cy="295" r="11" fill="#0a0c12" stroke="#00ff9f" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="1;0.2;1" dur="2.0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="235" cy="295" r="4.5" fill="#00ff9f">
    <animate attributeName="r" values="4.5;7;4.5" dur="2.0s" repeatCount="indefinite"/>
  </circle>

  <circle cx="360" cy="295" r="11" fill="#0a0c12" stroke="#00ff9f" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="1;0.2;1" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="295" r="4.5" fill="#00ff9f">
    <animate attributeName="r" values="4.5;7;4.5" dur="1.7s" repeatCount="indefinite"/>
  </circle>

  <!-- Output node -->
  <circle cx="210" cy="358" r="16" fill="#0a0c12" stroke="#f7a928" stroke-width="2.5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="210" cy="358" r="7" fill="#f7a928">
    <animate attributeName="r" values="7;10;7" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="210" y="392" font-family="'Courier New', monospace" font-size="10" fill="#4a5568" text-anchor="middle">OUTPUT</text>
  <text x="210" y="20" font-family="'Courier New', monospace" font-size="11" fill="#4a5568" text-anchor="middle">// AI Neural Network</text>
</svg>
