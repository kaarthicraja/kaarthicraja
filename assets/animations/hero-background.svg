<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="900" height="140">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f3ff" stroke-width="0.4" opacity="0.15"/>
    </pattern>
    <radialGradient id="aurora-l" cx="20%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora-r" cx="80%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#bb9af7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="140" fill="#0a0c12"/>
  <rect width="900" height="140" fill="url(#grid)"/>
  <rect width="900" height="140" fill="url(#aurora-l)"><animate attributeName="opacity" values="1;0.5;1" dur="7s" repeatCount="indefinite"/></rect>
  <rect width="900" height="140" fill="url(#aurora-r)"><animate attributeName="opacity" values="1;0.4;1" dur="9s" repeatCount="indefinite"/></rect>

  <!-- Stars -->
  <circle cx="45"  cy="18" r="1.2" fill="#fff"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="8"  r="1.5" fill="#00f3ff"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="220" cy="25" r="1"   fill="#fff"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="380" cy="12" r="1.3" fill="#bb9af7"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="510" cy="10" r="1.5" fill="#00f3ff"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="670" cy="15" r="1.2" fill="#bb9af7"><animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="840" cy="9"  r="1"   fill="#00f3ff"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="180" cy="90" r="1.3" fill="#00f3ff"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.9s" repeatCount="indefinite"/></circle>
  <circle cx="600" cy="85" r="1.5" fill="#bb9af7"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="820" cy="72" r="1"   fill="#fff"><animate attributeName="opacity" values="0.9;0.1;0.9" dur="3.9s" repeatCount="indefinite"/></circle>

  <!-- Floating particles -->
  <circle r="2" fill="#00f3ff" opacity="0.6">
    <animateMotion dur="14s" repeatCount="indefinite" path="M 50,110 Q 250,40 500,80 Q 750,120 900,50"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#bb9af7" opacity="0.5">
    <animateMotion dur="18s" repeatCount="indefinite" path="M 900,70 Q 650,110 400,50 Q 150,10 0,90"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="18s" repeatCount="indefinite"/>
  </circle>

  <!-- Scan line -->
  <rect x="0" y="0" width="900" height="1.5" fill="#00f3ff" opacity="0">
    <animate attributeName="y" values="-2;142;-2" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.18;0" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
