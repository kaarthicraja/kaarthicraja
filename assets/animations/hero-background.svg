<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="900" height="140">
  <defs>
    <!-- Grid only — no aurora blobs -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#34d399" stroke-width="0.4" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="900" height="140" fill="#111211"/>
  <rect width="900" height="140" fill="url(#grid)"/>

  <!-- Stars — emerald/amber/white -->
  <circle cx="45"  cy="18" r="1.2" fill="#fff">   <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="8"  r="1.5" fill="#34d399"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="220" cy="25" r="1"   fill="#fff">   <animate attributeName="opacity" values="0.5;1;0.5"   dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="380" cy="12" r="1.3" fill="#6ee7b7"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="510" cy="10" r="1.5" fill="#34d399"><animate attributeName="opacity" values="0.4;1;0.4"   dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="670" cy="15" r="1.2" fill="#d97706"><animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="840" cy="9"  r="1"   fill="#34d399"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="180" cy="90" r="1.3" fill="#6ee7b7"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.9s" repeatCount="indefinite"/></circle>
  <circle cx="600" cy="85" r="1.5" fill="#34d399"><animate attributeName="opacity" values="0.5;1;0.5"   dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="820" cy="72" r="1"   fill="#fff">   <animate attributeName="opacity" values="0.9;0.1;0.9" dur="3.9s" repeatCount="indefinite"/></circle>

  <!-- Floating particles -->
  <circle r="2" fill="#34d399" opacity="0.5">
    <animateMotion dur="14s" repeatCount="indefinite" path="M 50,110 Q 250,40 500,80 Q 750,120 900,50"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#d97706" opacity="0.4">
    <animateMotion dur="18s" repeatCount="indefinite" path="M 900,70 Q 650,110 400,50 Q 150,10 0,90"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="18s" repeatCount="indefinite"/>
  </circle>

  <!-- Scan line -->
  <rect x="0" y="0" width="900" height="1.5" fill="#34d399" opacity="0">
    <animate attributeName="y"       values="-2;142;-2"  dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.12;0"   dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
