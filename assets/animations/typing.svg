<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 60" width="900" height="60">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="60" fill="#0d0f14"/>

  <!-- Role 1: visible 0-4s -->
  <g>
    <text x="450" y="38" class="mono" font-size="22" fill="#00f3ff" text-anchor="middle" filter="url(#glow)" font-weight="bold">
      Cloud Engineer &amp; DevOps Architect
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.7;0.85" dur="20s" repeatCount="indefinite"/>
    </text>
  </g>
  <!-- Role 2: visible 4-8s -->
  <g>
    <text x="450" y="38" class="mono" font-size="22" fill="#bb9af7" text-anchor="middle" filter="url(#glow)" font-weight="bold">
      Flutter Developer &amp; Mobile Architect
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2;0.25;0.45;0.5" dur="20s" repeatCount="indefinite"/>
    </text>
  </g>
  <!-- Role 3: visible 8-12s -->
  <g>
    <text x="450" y="38" class="mono" font-size="22" fill="#00ff9f" text-anchor="middle" filter="url(#glow)" font-weight="bold">
      AI Automation Engineer
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.45;0.65;0.7" dur="20s" repeatCount="indefinite"/>
    </text>
  </g>
  <!-- Role 4: visible 12-16s -->
  <g>
    <text x="450" y="38" class="mono" font-size="22" fill="#f7a928" text-anchor="middle" filter="url(#glow)" font-weight="bold">
      Linux Enthusiast &amp; Open Source Builder
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.6;0.65;0.85;0.9" dur="20s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Blinking cursor -->
  <rect x="700" y="20" width="10" height="22" fill="#00f3ff">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>
</svg>
