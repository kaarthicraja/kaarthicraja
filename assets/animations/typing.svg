<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 60" width="900" height="60">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace; }
    </style>
  </defs>
  <rect width="900" height="60" fill="#111211"/>

  <!-- Role 1: visible 0-5s -->
  <g>
    <text x="450" y="38" class="mono" font-size="22" fill="#34d399" text-anchor="middle" font-weight="bold">
      Cloud Engineer &amp; DevOps Architect
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.05;0.2;0.25;1" dur="20s" repeatCount="indefinite"/>
    </text>
  </g>
  <!-- Role 2: visible 5-10s -->
  <g>
    <text x="450" y="38" class="mono" font-size="22" fill="#d97706" text-anchor="middle" font-weight="bold">
      Flutter Developer &amp; Mobile Architect
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.3;0.45;0.5;1" dur="20s" repeatCount="indefinite"/>
    </text>
  </g>
  <!-- Role 3: visible 10-15s -->
  <g>
    <text x="450" y="38" class="mono" font-size="22" fill="#6ee7b7" text-anchor="middle" font-weight="bold">
      AI Automation Engineer
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.55;0.7;0.75;1" dur="20s" repeatCount="indefinite"/>
    </text>
  </g>
  <!-- Role 4: visible 15-20s -->
  <g>
    <text x="450" y="38" class="mono" font-size="22" fill="#a7f3d0" text-anchor="middle" font-weight="bold">
      Linux Enthusiast &amp; Open Source Builder
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.75;0.8;0.95;1" dur="20s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Blinking cursor -->
  <rect x="700" y="20" width="10" height="22" fill="#34d399">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>
</svg>
