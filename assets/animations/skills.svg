<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200" width="840" height="200">
  <defs>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="840" height="200" fill="#0a0c12" rx="10"/>
  <rect x="1" y="1" width="838" height="198" fill="none" stroke="#1e2535" stroke-width="1" rx="10"/>
  <text x="16" y="22" font-family="'Courier New', monospace" font-size="11" fill="#4a5568">// tech.stack — KAARTHIC OS</text>

  <!-- 10 icons, evenly spaced across 840px -->
  <!-- spacing: 840/10 = 84px per slot. Icon center at slot_start + 42 -->

  <!-- Docker: slot 0, cx=42 -->
  <g transform="translate(42, 100)">
    <circle r="32" fill="#0d1520" stroke="#2496ED" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="32;34;32" dur="3s" repeatCount="indefinite"/>
    </circle>
    <path d="M-20,6 Q-20,18 0,18 Q20,18 22,6 Q24,-2 18,-2 Q14,-2 12,2 Q2,2 -2,-4 Q-8,-2 -20,6Z" fill="#2496ED"/>
    <rect x="-14" y="-12" width="6" height="6" fill="#2496ED"/>
    <rect x="-6"  y="-12" width="6" height="6" fill="#2496ED"/>
    <rect x="-6"  y="-20" width="6" height="6" fill="#2496ED"/>
    <rect x="2"   y="-12" width="6" height="6" fill="#2496ED"/>
    <circle cx="14" cy="4" r="1.5" fill="#fff"/>
    <text y="52" font-family="'Courier New', monospace" font-size="10" fill="#4a6080" text-anchor="middle">Docker</text>
  </g>

  <!-- Linux: slot 1, cx=126 -->
  <g transform="translate(126, 100)">
    <circle r="32" fill="#0d1520" stroke="#FCC624" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <ellipse cx="0" cy="0" rx="14" ry="18" fill="#e5e5e5"/>
    <ellipse cx="-10" cy="6" rx="5" ry="10" fill="#333" transform="rotate(25)"/>
    <ellipse cx="10"  cy="6" rx="5" ry="10" fill="#333" transform="rotate(-25 10 6)"/>
    <circle cx="-5" cy="-8" r="3" fill="#fff"/>
    <circle cx="-5" cy="-8" r="1.5" fill="#333"/>
    <circle cx="5"  cy="-8" r="3" fill="#fff"/>
    <circle cx="5"  cy="-8" r="1.5" fill="#333"/>
    <polygon points="-4,0 4,0 0,5" fill="#FCC624"/>
    <text y="52" font-family="'Courier New', monospace" font-size="10" fill="#4a6080" text-anchor="middle">Linux</text>
  </g>

  <!-- Flutter: slot 2, cx=210 -->
  <g transform="translate(210, 100)">
    <circle r="32" fill="#0d1520" stroke="#54C5F8" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <polygon points="-16,10 4,-10 24,-10 4,10" fill="#54C5F8"/>
    <polygon points="-16,20 4,0 24,0 4,20" fill="#01579B" opacity="0.9"/>
    <polygon points="-2,10 14,10 24,0 8,0" fill="#54C5F8" opacity="0.8"/>
    <text y="52" font-family="'Courier New', monospace" font-size="10" fill="#4a6080" text-anchor="middle">Flutter</text>
  </g>

  <!-- AWS: slot 3, cx=294 -->
  <g transform="translate(294, 100)">
    <circle r="32" fill="#0d1520" stroke="#FF9900" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <text y="5" font-family="'Courier New', monospace" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">AWS</text>
    <path d="M-18,12 Q0,22 18,12" fill="none" stroke="#FF9900" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="16,8 22,12 16,15" fill="#FF9900"/>
    <text y="52" font-family="'Courier New', monospace" font-size="10" fill="#4a6080" text-anchor="middle">AWS</text>
  </g>

  <!-- Azure: slot 4, cx=378 -->
  <g transform="translate(378, 100)">
    <circle r="32" fill="#0d1520" stroke="#0089D6" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <polygon points="-14,14 -2,-14 8,6 -4,6" fill="#0089D6" opacity="0.85"/>
    <polygon points="-6,14 12,-4 20,14" fill="#0078D4"/>
    <text y="52" font-family="'Courier New', monospace" font-size="10" fill="#4a6080" text-anchor="middle">Azure</text>
  </g>

  <!-- Python: slot 5, cx=462 -->
  <g transform="translate(462, 100)">
    <circle r="32" fill="#0d1520" stroke="#FFD343" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <path d="M0,-18 C-14,-18 -14,-8 -14,-2 L-14,2 L0,2 L0,6 L-18,6 C-22,6 -22,16 -10,16 L-2,16 L-2,20 C-2,24 6,24 6,20 L6,10 L-6,10 L-6,6 L6,6 C10,6 10,-4 6,-8 Z" fill="#3776AB"/>
    <path d="M0,18 C14,18 14,8 14,2 L14,-2 L0,-2 L0,-6 L18,-6 C22,-6 22,-16 10,-16 L2,-16 L2,-20 C2,-24 -6,-24 -6,-20 L-6,-10 L6,-10 L6,-6 L-6,-6 C-10,-6 -10,4 -6,8 Z" fill="#FFD343"/>
    <text y="52" font-family="'Courier New', monospace" font-size="10" fill="#4a6080" text-anchor="middle">Python</text>
  </g>

  <!-- NodeJS: slot 6, cx=546 -->
  <g transform="translate(546, 100)">
    <circle r="32" fill="#0d1520" stroke="#339933" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3.7s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <polygon points="0,-20 22,-8 22,8 0,20 -22,8 -22,-8" fill="none" stroke="#339933" stroke-width="2.5"/>
    <text y="5" font-family="'Courier New', monospace" font-size="11" fill="#339933" text-anchor="middle" font-weight="bold">node</text>
    <text y="52" font-family="'Courier New', monospace" font-size="10" fill="#4a6080" text-anchor="middle">Node.js</text>
  </g>

  <!-- Git: slot 7, cx=630 -->
  <g transform="translate(630, 100)">
    <circle r="32" fill="#0d1520" stroke="#F05032" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.9s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <rect x="-14" y="-14" width="28" height="28" rx="4" fill="none" stroke="#F05032" stroke-width="2.5" transform="rotate(45)"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="-8" y2="2" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <text y="52" font-family="'Courier New', monospace" font-size="10" fill="#4a6080" text-anchor="middle">Git</text>
  </g>

  <!-- Terraform: slot 8, cx=714 -->
  <g transform="translate(714, 100)">
    <circle r="32" fill="#0d1520" stroke="#844FBA" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3.3s" repeatCount="indefinite" begin="1.1s"/>
    </circle>
    <polygon points="-12,-16 2,-8 2,8 -12,0" fill="#844FBA"/>
    <polygon points="-12,4 2,12 2,24 -12,16" fill="#844FBA" opacity="0.75"/>
    <polygon points="4,-8 18,0 18,16 4,8" fill="#844FBA" opacity="0.9"/>
    <text y="52" font-family="'Courier New', monospace" font-size="10" fill="#4a6080" text-anchor="middle">Terraform</text>
  </g>

  <!-- Kubernetes: slot 9, cx=798 -->
  <g transform="translate(798, 100)">
    <circle r="32" fill="#0d1520" stroke="#326CE5" stroke-width="1.5" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="4.2s" repeatCount="indefinite" begin="1.4s"/>
    </circle>
    <polygon points="0,-22 18,5 10,24 -10,24 -18,5" fill="#326CE5" opacity="0.9"/>
    <circle cx="0" cy="0" r="9" fill="none" stroke="#fff" stroke-width="1.8"/>
    <line x1="0" y1="-9" x2="0" y2="-22" stroke="#fff" stroke-width="1.5"/>
    <line x1="0" y1="9" x2="0" y2="22" stroke="#fff" stroke-width="1.5"/>
    <line x1="-9" y1="0" x2="-18" y2="0" stroke="#fff" stroke-width="1.5"/>
    <line x1="9" y1="0" x2="18" y2="0" stroke="#fff" stroke-width="1.5"/>
    <text y="52" font-family="'Courier New', monospace" font-size="10" fill="#4a6080" text-anchor="middle">K8s</text>
  </g>
</svg>
