<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="900" height="120">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="wave-grad-1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d0f14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave-grad-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bb9af7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d0f14" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="120" fill="#0d0f14"/>

  <!-- Stars -->
  <g opacity="0.7">
    <circle cx="50" cy="20" r="1.5" fill="#fff"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="10" r="1" fill="#00f3ff"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="15" r="1.5" fill="#fff"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="8" r="1" fill="#bb9af7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="18" r="1.5" fill="#fff"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="12" r="1" fill="#00f3ff"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="22" r="1.5" fill="#fff"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Wave 1 (back) -->
  <path d="M0,70 C150,40 300,90 450,60 C600,30 750,80 900,55 L900,120 L0,120 Z" fill="url(#wave-grad-2)" opacity="0.5" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;-60,0;0,0" dur="7s" repeatCount="indefinite"/>
  </path>

  <!-- Wave 2 (front) -->
  <path d="M0,85 C120,60 280,100 450,75 C620,50 760,90 900,70 L900,120 L0,120 Z" fill="url(#wave-grad-1)" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;50,0;0,0" dur="5s" repeatCount="indefinite"/>
  </path>

  <!-- Glow line on top of wave -->
  <path d="M0,85 C120,60 280,100 450,75 C620,50 760,90 900,70" fill="none" stroke="#00f3ff" stroke-width="2" filter="url(#glow)" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,0;50,0;0,0" dur="5s" repeatCount="indefinite"/>
  </path>
</svg>
