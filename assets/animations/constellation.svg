<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="500" height="320">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="500" height="320" fill="#111211"/>
  <text x="250" y="18" font-family="'JetBrains Mono','JetBrains Mono',monospace" font-size="11" fill="#4a524a" text-anchor="middle">// constellation</text>

  <!-- Static stars at fixed positions -->
  <!-- Star positions: (x, y) -->
  <!-- Orion-like pattern adapted with 12 stars -->

  <!-- Define stars -->
  <circle id="s1"  cx="80"  cy="80"  r="3" fill="#34d399" filter="url(#glow)"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle id="s2"  cx="180" cy="50"  r="2.5" fill="#fff"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle id="s3"  cx="320" cy="70"  r="3" fill="#34d399" filter="url(#glow)"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle id="s4"  cx="420" cy="100" r="2" fill="#6ee7b7"><animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle id="s5"  cx="140" cy="160" r="3.5" fill="#fff" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle id="s6"  cx="250" cy="140" r="2.5" fill="#34d399"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle id="s7"  cx="370" cy="170" r="3" fill="#6ee7b7" filter="url(#glow)"><animate attributeName="opacity" values="0.8;0.4;0.8" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle id="s8"  cx="60"  cy="240" r="2" fill="#fff"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.9s" repeatCount="indefinite"/></circle>
  <circle id="s9"  cx="200" cy="260" r="3" fill="#34d399" filter="url(#glow)"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.7s" repeatCount="indefinite"/></circle>
  <circle id="s10" cx="310" cy="240" r="2.5" fill="#fff"><animate attributeName="opacity" values="0.6;0.8;0.6" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle id="s11" cx="440" cy="260" r="3" fill="#6ee7b7" filter="url(#glow)"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle id="s12" cx="250" cy="300" r="2" fill="#fff"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="3.2s" repeatCount="indefinite"/></circle>

  <!-- Animated connection lines that fade in/out sequentially -->
  <line x1="80" y1="80" x2="180" y2="50" stroke="#34d399" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="0s"/>
  </line>
  <line x1="180" y1="50" x2="320" y2="70" stroke="#34d399" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="0.6s"/>
  </line>
  <line x1="320" y1="70" x2="420" y2="100" stroke="#6ee7b7" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="1.2s"/>
  </line>
  <line x1="80"  y1="80"  x2="140" y2="160" stroke="#34d399" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="1.8s"/>
  </line>
  <line x1="140" y1="160" x2="250" y2="140" stroke="#34d399" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="2.4s"/>
  </line>
  <line x1="250" y1="140" x2="370" y2="170" stroke="#34d399" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="3.0s"/>
  </line>
  <line x1="370" y1="170" x2="420" y2="100" stroke="#6ee7b7" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="3.6s"/>
  </line>
  <line x1="140" y1="160" x2="60"  y2="240" stroke="#34d399" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="4.2s"/>
  </line>
  <line x1="60"  y1="240" x2="200" y2="260" stroke="#34d399" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="4.8s"/>
  </line>
  <line x1="200" y1="260" x2="310" y2="240" stroke="#6ee7b7" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="5.4s"/>
  </line>
  <line x1="310" y1="240" x2="440" y2="260" stroke="#34d399" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="6.0s"/>
  </line>
  <line x1="200" y1="260" x2="250" y2="300" stroke="#34d399" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="6.6s"/>
  </line>
  <line x1="310" y1="240" x2="250" y2="300" stroke="#6ee7b7" stroke-width="0.8">
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="7.2s"/>
  </line>
</svg>
