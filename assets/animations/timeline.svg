<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="500" height="320">
  <defs>
    <style>.mono { font-family: 'JetBrains Mono','JetBrains Mono',monospace; }</style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="320" fill="#111211"/>

  <!-- Vertical spine -->
  <line x1="60" y1="20" x2="60" y2="300" stroke="#34d399" stroke-width="2" opacity="0.4"/>
  <line x1="60" y1="20" x2="60" y2="300" stroke="#34d399" stroke-width="2" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Node 1 -->
  <circle cx="60" cy="60" r="10" fill="#111211" stroke="#34d399" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="60" r="4" fill="#34d399">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <line x1="70" y1="60" x2="120" y2="60" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="120" y="45" width="350" height="30" fill="#1f211f" rx="6" stroke="#34d399" stroke-width="1" opacity="0.6"/>
  <text x="135" y="55" class="mono" font-size="11" fill="#6b736b">2023</text>
  <text x="180" y="55" class="mono" font-size="12" fill="#34d399">☁ Started Cloud Engineering</text>
  <text x="135" y="70" class="mono" font-size="11" fill="#d1d5d1">AWS, Azure, GCP foundations laid</text>

  <!-- Node 2 -->
  <circle cx="60" cy="130" r="10" fill="#111211" stroke="#6ee7b7" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="130" r="4" fill="#6ee7b7">
    <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <line x1="70" y1="130" x2="120" y2="130" stroke="#6ee7b7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="120" y="115" width="350" height="30" fill="#1f211f" rx="6" stroke="#6ee7b7" stroke-width="1" opacity="0.6"/>
  <text x="135" y="125" class="mono" font-size="11" fill="#6b736b">2024</text>
  <text x="180" y="125" class="mono" font-size="12" fill="#6ee7b7">⚙ Mastered DevOps Pipeline</text>
  <text x="135" y="140" class="mono" font-size="11" fill="#d1d5d1">Docker, Kubernetes, Terraform deployed</text>

  <!-- Node 3 -->
  <circle cx="60" cy="200" r="10" fill="#111211" stroke="#54C5F8" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="200" r="4" fill="#54C5F8">
    <animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <line x1="70" y1="200" x2="120" y2="200" stroke="#54C5F8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="120" y="185" width="350" height="30" fill="#1f211f" rx="6" stroke="#54C5F8" stroke-width="1" opacity="0.6"/>
  <text x="135" y="195" class="mono" font-size="11" fill="#6b736b">2024</text>
  <text x="180" y="195" class="mono" font-size="12" fill="#54C5F8">📱 Flutter Apps in Production</text>
  <text x="135" y="210" class="mono" font-size="11" fill="#d1d5d1">Cross-platform mobile dev, Firebase</text>

  <!-- Node 4 -->
  <circle cx="60" cy="270" r="10" fill="#111211" stroke="#a7f3d0" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="270" r="4" fill="#a7f3d0">
    <animate attributeName="r" values="4;6;4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <line x1="70" y1="270" x2="120" y2="270" stroke="#a7f3d0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="120" y="255" width="350" height="30" fill="#1f211f" rx="6" stroke="#a7f3d0" stroke-width="1" opacity="0.6"/>
  <text x="135" y="265" class="mono" font-size="11" fill="#6b736b">2025</text>
  <text x="180" y="265" class="mono" font-size="12" fill="#a7f3d0">🤖 AI Automation — Present</text>
  <text x="135" y="280" class="mono" font-size="11" fill="#d1d5d1">LLM pipelines, n8n, Python agents</text>
</svg>
