<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="800" height="140">
  <defs>
    <style>.mono { font-family: 'Courier New', monospace; }</style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#00f3ff" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="140" fill="#0d0f14" rx="12"/>
  <rect width="800" height="140" fill="url(#dots)" rx="12"/>

  <!-- Neon border -->
  <rect x="2" y="2" width="796" height="136" rx="11" fill="none"
        stroke="#00f3ff" stroke-width="1.5" filter="url(#glow)" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Left accent bar -->
  <rect x="0" y="20" width="5" height="100" fill="#bc13fe" rx="2"/>

  <!-- Giant decorative quote mark -->
  <text x="18" y="105" class="mono" font-size="100" fill="#00f3ff" opacity="0.07">"</text>

  <!-- Quote text -->
  <text x="60" y="69" class="mono" font-size="20" fill="#00f3ff" filter="url(#glow)" font-weight="bold">
    <tspan x="60" dy="0">Make it work, make it right, make it fast.</tspan>
  </text>

  <!-- Author -->
  <text x="750" y="118" class="mono" font-size="16" fill="#bb9af7"
        font-style="italic" text-anchor="end">~ Kent Beck</text>
</svg>