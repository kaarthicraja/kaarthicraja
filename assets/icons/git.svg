<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
  <defs>
    <style>
      .bg { fill: #1a1b26; transition: all 0.3s ease; transform-origin: center; }
      .icon { transition: all 0.3s ease; transform-origin: center; }
      svg:hover .bg { fill: #24283b; stroke: #F05032; stroke-width: 2px; filter: drop-shadow(0 0 8px #F05032); }
      svg:hover .icon { transform: scale(1.1); filter: drop-shadow(0 0 5px #F05032); }
      
      @keyframes pulse {
        0%, 100% { filter: drop-shadow(0 0 2px #F05032); }
        50% { filter: drop-shadow(0 0 8px #F05032); }
      }
      .icon { animation: pulse 3s infinite alternate; }
    </style>
  </defs>
  
  <circle class="bg" cx="50" cy="50" r="45" />
  
  <g class="icon" transform="translate(25, 25)">
    <rect x="10" y="10" width="30" height="30" fill="none" stroke="#F05032" stroke-width="4" rx="4" transform="rotate(45 25 25)" />
    <line x1="25" y1="15" x2="25" y2="35" stroke="#fff" stroke-width="3" stroke-linecap="round" />
    <line x1="25" y1="35" x2="15" y2="25" stroke="#fff" stroke-width="3" stroke-linecap="round" />
    <circle cx="25" cy="15" r="4" fill="#F05032" stroke="#fff" stroke-width="1.5" />
    <circle cx="25" cy="35" r="4" fill="#F05032" stroke="#fff" stroke-width="1.5" />
    <circle cx="15" cy="25" r="4" fill="#F05032" stroke="#fff" stroke-width="1.5" />
  </g>
</svg>
