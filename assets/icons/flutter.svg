<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
  <defs>
    <style>
      .bg { fill: #1a1b26; transition: all 0.3s ease; transform-origin: center; }
      .icon { transition: all 0.3s ease; transform-origin: center; }
      svg:hover .bg { fill: #24283b; stroke: #54C5F8; stroke-width: 2px; filter: drop-shadow(0 0 8px #54C5F8); }
      svg:hover .icon { transform: scale(1.1); filter: drop-shadow(0 0 5px #54C5F8); }
      
      @keyframes pulse {
        0%, 100% { filter: drop-shadow(0 0 2px #54C5F8); }
        50% { filter: drop-shadow(0 0 8px #54C5F8); }
      }
      .icon { animation: pulse 3s infinite alternate; }
    </style>
  </defs>
  
  <circle class="bg" cx="50" cy="50" r="45" />
  
  <g class="icon" transform="translate(25, 20)">
    <polygon points="15,35 35,15 55,15 35,35" fill="#54C5F8" />
    <polygon points="15,45 35,65 55,65 35,45" fill="#01579B" />
    <polygon points="25,45 35,35 55,35 45,45" fill="#54C5F8" opacity="0.8"/>
  </g>
</svg>
