<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
  <defs>
    <style>
      .bg { fill: #1a1b26; transition: all 0.3s ease; transform-origin: center; }
      .icon { transition: all 0.3s ease; transform-origin: center; }
      svg:hover .bg { fill: #24283b; stroke: #339933; stroke-width: 2px; filter: drop-shadow(0 0 8px #339933); }
      svg:hover .icon { transform: scale(1.1); filter: drop-shadow(0 0 5px #339933); }
      
      @keyframes pulse {
        0%, 100% { filter: drop-shadow(0 0 2px #339933); }
        50% { filter: drop-shadow(0 0 8px #339933); }
      }
      .icon { animation: pulse 3s infinite alternate; }
    </style>
  </defs>
  
  <circle class="bg" cx="50" cy="50" r="45" />
  
  <g class="icon" transform="translate(20, 20)">
    <polygon points="30,5 55,20 55,45 30,60 5,45 5,20" fill="none" stroke="#339933" stroke-width="3" />
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#339933" text-anchor="middle">node</text>
  </g>
</svg>
