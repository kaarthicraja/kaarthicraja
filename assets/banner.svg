<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300">
  <defs>
    <!-- Background — warm charcoal, no aurora blobs -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1210" />
      <stop offset="50%"  stop-color="#0f1a14" />
      <stop offset="100%" stop-color="#080e09" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#34d399" stroke-width="1" stroke-opacity="0.08"/>
    </pattern>

    <style>
      .name {
        font-family: 'Segoe UI', Inter, sans-serif;
        font-size: 38px;
        font-weight: 900;
        fill: #ffffff;
        letter-spacing: 5px;
      }
      .os-box {
        font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        font-size: 14px;
      }
      .os-box-border {
        fill: none;
        stroke: #34d399;
        stroke-width: 1px;
        stroke-opacity: 0.5;
      }
      .os-box-title {
        fill: #6b736b;
        font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 2px;
      }
      .os-box-key  { fill: #4a524a; }
      .os-box-val  { fill: #34d399; font-weight: bold; }
      .os-box-val-warm { fill: #d97706; font-weight: bold; }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      .cursor {
        fill: #34d399;
        animation: blink 0.8s step-end infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Dot grid — sole decorative element, no blobs -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Subtle scan line -->
  <rect x="0" y="0" width="1000" height="1.5" fill="#34d399" opacity="0">
    <animate attributeName="y"       values="-2;302;-2"  dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.10;0"   dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating Particles — emerald + amber -->
  <g>
    <circle cx="100" cy="350" r="2.5" fill="#34d399" opacity="0.6">
      <animate attributeName="cy" values="350;-50"         dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="100;130;100"     dur="4s"  repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="350" r="1.5" fill="#34d399" opacity="0.4">
      <animate attributeName="cy" values="350;-50"         dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="300;270;300"     dur="6s"  repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="350" r="3" fill="#34d399" opacity="0.7">
      <animate attributeName="cy" values="350;-50"         dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="500;540;500"     dur="5s"  repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="350" r="2" fill="#d97706" opacity="0.5">
      <animate attributeName="cy" values="350;-50"         dur="15s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="700;670;700"     dur="7s"  repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="350" r="2.5" fill="#34d399" opacity="0.6">
      <animate attributeName="cy" values="350;-50"         dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="900;940;900"     dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="350" r="2" fill="#d97706" opacity="0.5">
      <animate attributeName="cy" values="350;-50"         dur="16s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="200;180;200"     dur="5s"  repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="350" r="1.5" fill="#34d399" opacity="0.4">
      <animate attributeName="cy" values="350;-50"         dur="19s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="600;570;600"     dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="350" r="2.5" fill="#d97706" opacity="0.45">
      <animate attributeName="cy" values="350;-50"         dur="13s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="800;830;800"     dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Card panel — solid dark surface, 1px emerald border -->
  <g transform="translate(250, 20)">
    <rect class="os-box-border" x="0" y="0" width="500" height="260" rx="6"/>

    <!-- Name -->
    <text class="name" x="250" y="60" text-anchor="middle">
      KAARTHIC RAJA
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
    </text>

    <!-- Role subtitle -->
    <text class="os-box-title" x="250" y="98" text-anchor="middle">
      CLOUD ENGINEER  ·  DEVOPS  ·  FLUTTER  ·  AI
    </text>

    <!-- Divider -->
    <line x1="40" y1="115" x2="460" y2="115" stroke="#1e261e" stroke-width="1"/>

    <!-- Stack details grid -->
    <g class="os-box" transform="translate(40, 150)">
      <text x="0" y="0">
        <tspan class="os-box-key">Cloud......</tspan> <tspan class="os-box-val">AWS · Azure</tspan>
      </text>
      <text x="0" y="28">
        <tspan class="os-box-key">Container..</tspan> <tspan class="os-box-val">Docker · K8s</tspan>
      </text>
      <text x="0" y="56">
        <tspan class="os-box-key">IaC........</tspan> <tspan class="os-box-val">Terraform</tspan>
      </text>
    </g>

    <g class="os-box" transform="translate(270, 150)">
      <text x="0" y="0">
        <tspan class="os-box-key">Mobile.....</tspan> <tspan class="os-box-val-warm">Flutter</tspan>
      </text>
      <text x="0" y="28">
        <tspan class="os-box-key">Automation.</tspan> <tspan class="os-box-val">Python · LLM</tspan>
      </text>
      <!-- Blinking status dot -->
      <circle cx="172" cy="79" r="4" fill="#34d399">
        <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="84">
        <tspan class="os-box-key">Status.....</tspan> <tspan class="os-box-val">Available</tspan>
      </text>
    </g>
  </g>

</svg>
