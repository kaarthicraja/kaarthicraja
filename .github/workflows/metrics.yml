##############################################################################
# metrics.yml — Advanced GitHub Profile Metrics
#
# HOW IT WORKS:
#   1. Triggers on every push to `main`, daily at 02:00 UTC, and manually.
#   2. Uses `lowlighter/metrics@latest` — the industry-standard GitHub
#      metrics engine — to generate a rich SVG dashboard.
#   3. The action authenticates using GITHUB_TOKEN to read your public
#      profile data (repos, languages, stars, commit activity).
#   4. Configured plugins:
#      - `languages`: Shows your top programming languages with percentages.
#      - `activity`: Recent public activity on GitHub.
#      - `habits`: Best coding times and commit frequency patterns.
#   5. The output SVG is committed to `assets/generated/metrics.svg` using
#      the same GITHUB_TOKEN — zero secrets configuration needed.
#
# NOTE: For plugins requiring extended scope (e.g. private repos, sponsors),
#       you would create a Personal Access Token (PAT) and store it as a
#       repository secret named `METRICS_TOKEN`. This workflow uses only
#       public data so GITHUB_TOKEN is sufficient.
##############################################################################
name: 📊 Generate GitHub Metrics

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

jobs:
  generate-metrics:
    name: Generate Metrics SVG
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📊 Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: kaarthicraja
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: Asia/Kolkata
          config_output: svg
          filename: assets/generated/metrics.svg
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_colors: github
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          output_action: commit
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "chore(auto): update metrics svg [skip ci]"
